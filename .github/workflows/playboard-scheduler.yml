name: PlayBoard Scheduler

on:
  schedule:
    # Run every 15 minutes, offset from the top of the hour to reduce scheduler congestion.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

concurrency:
  group: playboard-scheduler
  cancel-in-progress: false

jobs:
  run-playboard-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      PLAYBOARD_BASE_URL: ${{ secrets.PLAYBOARD_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}

    steps:
      - name: Validate scheduler secrets
        run: |
          test -n "$PLAYBOARD_BASE_URL"
          test -n "$CRON_SECRET"

      - name: Run automation queue
        run: |
          BASE_URL="${PLAYBOARD_BASE_URL%/}"
          curl -fsS --retry 2 --retry-delay 5 --max-time 30 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/run-automation-queue"

      - name: Send ready lead emails
        run: |
          BASE_URL="${PLAYBOARD_BASE_URL%/}"
          curl -fsS --retry 2 --retry-delay 5 --max-time 30 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/send-ready-lead-emails"

      - name: Run automation queue again
        run: |
          BASE_URL="${PLAYBOARD_BASE_URL%/}"
          curl -fsS --retry 2 --retry-delay 5 --max-time 30 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/run-automation-queue"
