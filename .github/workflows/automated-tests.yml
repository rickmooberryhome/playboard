name: Automated Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  automated-tests:
    name: Phase 1, Phase 2, Phase 3, and Phase 4 tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run test:syntax

      - name: Phase 1 integration test with cleanup
        run: npm run test:phase1

      - name: Phase 2 automation integration test with cleanup
        run: npm run test:phase2

      - name: Phase 3 analytics integration test with cleanup
        run: npm run test:phase3

      - name: Phase 4 AI integration test with cleanup
        run: npm run test:phase4

      - name: Full integration suite
        run: npm run test:integration
