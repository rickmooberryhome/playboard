name: Automated Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  phase-1-tests:
    name: Phase 1 funnel tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Syntax check
        run: npm run test:syntax

      - name: Phase 1 integration test with cleanup
        run: npm run test:integration
